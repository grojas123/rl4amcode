project:
  name: rl4am
  seed: 42
  device: auto

data:
  source: data/eod_data.csv
  symbol: EURUSD 
  date_column: auto
  price_column: auto
  return_type: simple

environment:
  window: 20
  riskless_rate_annual: 0.0
  transaction_cost: 0.0002
  smoothness_penalty: 0.0
  reward:
    mode: log_return
    clip: 0.02
    positive_reward: 1.0
    negative_reward: -1.0
    zero_reward: 0.0
  state_features:
    enabled: true
    normalize: true
    ret_lookback: [5, 20]
    vol_lookback: [5, 20]
    trend_gap: [20, 60]
    drawdown_lookback: [60]

sampling:
  train_slices: 300
  test_slices: 10
  trading_days_per_slice: 504
  overlap: true
  normalization: training_pool
  seed: 42

experiments:
  a2c:
    enabled: true
    agent: a2c_beta
    action_bounds:
      min_weight: 0.0
      max_weight: 1.0
    model:
      hidden_units: 256
    optimisation:
      learning_rate: 0.001
      gamma: 0.95
      gae_lambda: 0.9
      entropy_coefficient: 0.05
      value_coefficient: 0.5
      max_grad_norm: 0.5
      updates: 100

  dqn:
    enabled: true
    agent: double_dqn
    action_grid:
      min_weight: 0.0
      max_weight: 1.0
      bins: 21
    model:
      hidden_units: 128
    optimisation:
      learning_rate: 0.0003
      gamma: 0.99
      batch_size: 64
      replay_capacity: 10000
      min_replay_size: 256
      train_steps_per_env_step: 1
      target_update_interval: 250
      epsilon_start: 1.0
      epsilon_final: 0.05
      epsilon_decay: 0.995
      max_grad_norm: 1.0
      double_dqn: true

baselines:
  enabled: true
  selection_metric: terminal_equity
  min_weight: 0.01
  mean_variance_alpha: 0.25  # cautious Kelly

report:
  output_profile: paper
  figure_format: png
